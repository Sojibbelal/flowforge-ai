<!DOCTYPE html>
<html>
<head>
  <title>FlowForge AI</title>
</head>
<body>
  <h1>Generate Shopify Flows</h1>

  <input id="url" placeholder="Enter store URL" />
  <button onclick="generate()">Generate</button>

  <pre id="output"></pre>

  <script>
    if (!url) {
  alert("Please enter a URL");
  return;
}
  async function generate() {
  const url = document.getElementById("url").value;

  const res = await fetch("https://flowforge-ai-sn14.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      url: url
    })
  });

  const data = await res.json();
  document.getElementById("output").innerText = data.result;
}
    }
  </script>
</body>
</html>
